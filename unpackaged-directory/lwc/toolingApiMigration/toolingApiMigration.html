<template>
  <article class="slds-card slds-m-bottom_xx-large">
    <div class="slds-grid slds-card__header">
      <header class="slds-media slds-media_center slds-has-flexi-truncate">
        <div class="slds-media__figure">
          <span class="slds-icon_container">
            <lightning-icon icon-name="utility:connected_apps"></lightning-icon>
          </span>
        </div>
        <div class="slds-media__body">
          <h2 class="slds-card__header-title">Tooling API Setup</h2>
        </div>
      </header>
    </div>
    <div class="slds-card__body slds-card__body_inner">
      <ol class="slds-setup-assistant">
        <li class="slds-setup-assistant__item">
          <div class="">
            <article class="slds-setup-assistant__step">
              <div class="slds-setup-assistant__step-summary">
                <div class="slds-media">
                  <div
                    class="slds-setup-assistant__step-summary-content slds-media__body"
                  >
                    <h3
                      class="slds-setup-assistant__step-summary-title slds-text-heading_small"
                    >
                      <lightning-icon
                        icon-name="utility:connected_apps"
                        size="small"
                        class="slds-var-p-right_small"
                      ></lightning-icon>
                      Tooling API Named Credential Setup
                    </h3>
                    <div
                      class="slds-progress slds-progress_vertical slds-progress_success"
                    >
                      <ol
                        class="slds-progress__list slds-progress__list-bordered"
                      >
                        <li class="slds-progress__item">
                          <template if:false={isToolingCredentialConfigured}>
                            <div class="slds-progress__marker">
                              <span class="slds-assistive-text">Active</span>
                            </div>
                          </template>
                          <template if:true={isToolingCredentialConfigured}>
                            <span class="slds-progress__marker">
                              <lightning-icon
                                icon-name="utility:success"
                                variant="success"
                                size="x-small"
                              ></lightning-icon>
                            </span>
                          </template>
                          <div
                            class="slds-progress__item_content slds-grid slds-grid_align-spread"
                          >
                            <div class="slds-col">
                              <strong class="slds-text-title_caps">
                                Create an External Client App (ECA)
                              </strong>
                              <p class="slds-var-m-top_xx-small">
                                In Setup &rarr; External Client App Manager,
                                create a new ECA with the settings below:
                              </p>

                              <div
                                class="slds-grid slds-gutters slds-wrap slds-var-m-top_small"
                              >
                                <div
                                  class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-var-p-right_medium slds-var-p-bottom_small"
                                >
                                  <p class="slds-text-title_caps">
                                    1. Create the app
                                  </p>
                                  <p
                                    class="slds-var-m-top_small slds-var-m-bottom_xx-small"
                                  >
                                    Basic Information
                                  </p>
                                  <ul
                                    class="slds-list_dotted slds-var-m-left_small"
                                  >
                                    <li>
                                      Distribution State: <code>Local</code>
                                    </li>
                                  </ul>
                                  <p
                                    class="slds-var-m-top_small slds-var-m-bottom_xx-small"
                                  >
                                    API (Enable OAuth Settings)
                                  </p>
                                  <ul
                                    class="slds-list_dotted slds-var-m-left_small"
                                  >
                                    <li>Enable OAuth</li>
                                    <li>
                                      Callback URL:
                                      https://login.salesforce.com/services/oauth2/callback
                                    </li>
                                    <li>
                                      OAuth Scopes:
                                      <ul
                                        class="slds-list_dotted slds-var-m-left_small"
                                      >
                                        <li>
                                          Manage user data via APIs
                                          (<code>api</code>)
                                        </li>
                                        <li>
                                          Perform requests at any time
                                          (<code>refresh_token</code>,
                                          <code>offline_access</code>)
                                        </li>
                                      </ul>
                                    </li>
                                    <li>
                                      Flow Enablement: Enable Client Credentials
                                      Flow
                                    </li>
                                  </ul>
                                </div>

                                <div
                                  class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-var-p-bottom_small"
                                >
                                  <p class="slds-text-title_caps">
                                    2. Then edit the app
                                  </p>
                                  <p
                                    class="slds-var-m-top_small slds-var-m-bottom_xx-small"
                                  >
                                    OAuth Flows and External Client App
                                    Enhancements
                                  </p>
                                  <ul
                                    class="slds-list_dotted slds-var-m-left_small"
                                  >
                                    <li>Enable Client Credentials Flow</li>
                                    <li>
                                      Run As: the Username of a relevant admin
                                    </li>
                                  </ul>
                                  <p
                                    class="slds-var-m-top_small slds-var-m-bottom_xx-small"
                                  >
                                    Finally
                                  </p>
                                  <ul
                                    class="slds-list_dotted slds-var-m-left_small"
                                  >
                                    <li>
                                      Copy the Consumer Key and Consumer Secret
                                      for the next step
                                    </li>
                                  </ul>
                                </div>
                              </div>
                            </div>
                            <div class="slds-shrink-none slds-var-m-left_small">
                              <lightning-button-icon
                                icon-name="utility:setup"
                                variant="brand"
                                onclick={navigateToExternalClientApps}
                                disabled={isSetupEnabled}
                              ></lightning-button-icon>
                            </div>
                          </div>
                        </li>
                        <li class="slds-progress__item">
                          <template if:false={isToolingCredentialConfigured}>
                            <div class="slds-progress__marker">
                              <span class="slds-assistive-text">Active</span>
                            </div>
                          </template>
                          <template if:true={isToolingCredentialConfigured}>
                            <span class="slds-progress__marker">
                              <lightning-icon
                                icon-name="utility:success"
                                variant="success"
                                size="x-small"
                              ></lightning-icon>
                            </span>
                          </template>
                          <div class="slds-progress__item_content">
                            <div class="slds-grid slds-grid_align-spread">
                              <div class="slds-col">
                                <strong class="slds-text-title_caps">
                                  Save External Client App API Client
                                  Credentials
                                </strong>
                                <p class="slds-var-m-top_xx-small">
                                  Paste the Client ID and Client Secret from
                                  your External Client App. They are encrypted
                                  by the platform and never displayed again.
                                </p>
                              </div>
                              <div
                                class="slds-shrink-none slds-var-m-left_small"
                              >
                                <lightning-button-icon
                                  icon-name={credentialToggleIcon}
                                  variant="brand"
                                  onclick={toggleCredentials}
                                ></lightning-button-icon>
                              </div>
                            </div>
                            <template if:true={credentialsExpanded}>
                              <div
                                class="slds-var-m-top_small slds-border_top slds-border_right slds-border_bottom slds-border_left slds-box slds-box_xx-small"
                              >
                                <lightning-card>
                                  <h3 slot="title" class="slds-truncate">
                                    <lightning-icon
                                      icon-name="standard:password"
                                      size="medium"
                                      class="slds-m-right_small"
                                    ></lightning-icon>
                                    External Client App API Client Credentials
                                  </h3>
                                  <template if:false={showCredentialEditFields}>
                                    <lightning-button
                                      slot="actions"
                                      label="Edit"
                                      onclick={editToolingCredentials}
                                    ></lightning-button>
                                  </template>
                                  <div class="slds-var-p-horizontal_medium">
                                    <template
                                      if:true={showCredentialEditFields}
                                    >
                                      <lightning-input
                                        type="text"
                                        label="Client ID (Consumer Key)"
                                        value={toolingClientId}
                                        onchange={handleToolingClientIdChange}
                                        class="slds-var-m-bottom_x-small"
                                      ></lightning-input>
                                      <lightning-input
                                        type="password"
                                        label="Client Secret (Consumer Secret)"
                                        value={toolingClientSecret}
                                        onchange={handleToolingClientSecretChange}
                                      ></lightning-input>
                                    </template>
                                    <template
                                      if:false={showCredentialEditFields}
                                    >
                                      <lightning-input
                                        type="text"
                                        label="Client ID (Consumer Key)"
                                        value="••••••••••••••••••••••••"
                                        disabled
                                        class="slds-var-m-bottom_x-small"
                                      ></lightning-input>
                                      <lightning-input
                                        type="password"
                                        label="Client Secret (Consumer Secret)"
                                        value="••••••••••••••••••••••••"
                                        disabled
                                      ></lightning-input>
                                    </template>
                                  </div>
                                  <template if:true={showCredentialEditFields}>
                                    <div
                                      slot="footer"
                                      class="slds-grid slds-grid_align-end"
                                    >
                                      <template if:true={isEditingCredentials}>
                                        <lightning-button
                                          label="Cancel"
                                          onclick={cancelEditToolingCredentials}
                                          class="slds-var-m-right_x-small"
                                        ></lightning-button>
                                      </template>
                                      <lightning-button
                                        label="Save"
                                        variant="brand"
                                        onclick={saveToolingCredentials}
                                        disabled={saveCredentialsDisabled}
                                      ></lightning-button>
                                    </div>
                                  </template>
                                </lightning-card>
                              </div>
                            </template>
                          </div>
                        </li>
                        <li class="slds-progress__item">
                          <template if:false={isNamedCredentialEnabled}>
                            <div class="slds-progress__marker">
                              <span class="slds-assistive-text">Active</span>
                            </div>
                          </template>
                          <template if:true={isNamedCredentialEnabled}>
                            <span class="slds-progress__marker">
                              <lightning-icon
                                icon-name="utility:success"
                                variant="success"
                                size="x-small"
                              ></lightning-icon>
                            </span>
                          </template>
                          <div
                            class="slds-progress__item_content slds-grid slds-grid_align-spread"
                          >
                            <div class="slds-col">
                              <strong class="slds-text-title_caps">
                                Test &amp; Enable Tooling API
                              </strong>
                              <p class="slds-var-m-top_xx-small">
                                Points the callout endpoint at this org's My
                                Domain, runs a live Tooling API callout through
                                the Named Credential, and switches Package
                                Visualizer to it on success.
                              </p>
                            </div>
                            <div class="slds-shrink-none slds-var-m-left_small">
                              <lightning-button-icon
                                icon-name="utility:success"
                                variant="brand"
                                onclick={testAndEnableNamedCredential}
                                disabled={testAndEnableDisabled}
                              ></lightning-button-icon>
                            </div>
                          </div>
                        </li>
                      </ol>
                    </div>
                  </div>
                </div>
              </div>
            </article>
          </div>
        </li>
      </ol>
    </div>
  </article>
</template>
