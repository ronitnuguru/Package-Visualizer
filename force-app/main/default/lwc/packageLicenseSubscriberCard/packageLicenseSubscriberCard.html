<template>
  <lightning-card>
    <h3 slot="title" class="slds-truncate">
      <lightning-icon
        icon-name="standard:customer"
        size="medium"
        class="slds-m-right_small"
      ></lightning-icon>
      <template lwc:if={subscriber}>
        <template lwc:if={subscriber.orgName}>{subscriber.orgName}</template>
      </template>
      <template lwc:else>Package Subscriber</template>
    </h3>
    <template lwc:if={displayPackageSubscriberFeatureEnabled}>
      <template lwc:if={subscriber}>
        <lightning-button-group slot="actions">
          <template lwc:if={displayEditLicense}>
            <lightning-button
              label="Edit"
              onclick={handleEdit}
            ></lightning-button>
          </template>
          <lightning-button-icon
            icon-name="utility:einstein"
            variant="border-filled"
            tooltip="Request AppAnalytics"
            onclick={handleAppAnalyticsSubscribers}
          ></lightning-button-icon>
          <lightning-button-icon
            variant="border-filled"
            icon-name="utility:questions_and_answers"
            tooltip="Log Into Subscriber Console"
            onclick={handleLogIntoSubscriberConsole}
          ></lightning-button-icon>
          <template lwc:if={isAppAnalyticsTab}>
            <lightning-button-icon
              icon-name="utility:refresh"
              variant="border-filled"
              tooltip="Refresh Requests"
              onclick={handleAppAnalyticsRefresh}
            ></lightning-button-icon>
          </template>
          <lightning-button-icon
            icon-name="utility:salesforce1"
            variant="border-filled"
            tooltip="Trust Instance"
            onclick={handleTrustInstance}
          ></lightning-button-icon>
          <template lwc:if={displayEditLicense}>
            <lightning-button-icon
              icon-name="utility:help_doc_ext"
              variant="border-filled"
              tooltip="Modify License Documentation"
              onclick={handleHelpDoc}
            ></lightning-button-icon>
          </template>
        </lightning-button-group>
      </template>
    </template>
    <div class="slds-card__body body-style">
      <template if:true={displaySpinner}>
        <lightning-spinner
          alternative-text="Loading"
          size="medium"
          variant="brand"
        ></lightning-spinner>
      </template>
      <template lwc:if={displayPackageSubscriberFeatureEnabled}>
        <template lwc:if={subscriber}>
          <lightning-tabset active-tab-value={selectedTab}>
            <lightning-tab
              label="Details"
              value="details"
              icon-name="standard:display_text"
              onactive={handleTabActive}
            >
              <div
                class="slds-grid slds-wrap slds-gutters slds-m-horizontal_xx-small"
              >
                <div class="slds-col">
                  <template lwc:if={subscriber.orgStatus}>
                    <lightning-input
                      type="text"
                      label="Org Status"
                      value={subscriber.orgStatus}
                      class="slds-border_bottom"
                      readonly
                    ></lightning-input>
                  </template>
                  <template lwc:if={subscriber.orgKey}>
                    <lightning-input
                      type="text"
                      label="Org ID"
                      value={subscriber.orgKey}
                      class="slds-border_bottom"
                      readonly
                    ></lightning-input>
                  </template>
                  <template lwc:if={subscriber.instanceName}>
                    <lightning-input
                      type="text"
                      label="Instance"
                      value={subscriber.instanceName}
                      class="slds-border_bottom"
                      readonly
                    ></lightning-input>
                  </template>
                </div>
                <div class="slds-col">
                  <template lwc:if={subscriber.orgType}>
                    <lightning-input
                      type="text"
                      label="Org Type"
                      value={subscriber.orgType}
                      class="slds-border_bottom"
                      readonly
                    ></lightning-input>
                    <template if:true={subscriber.SystemModstamp}>
                      <div class="slds-form-element slds-border_bottom">
                        <label
                          class="slds-form-element__label input-style slds-var-p-bottom_xx-small"
                          for="text-input-id-1"
                        >
                          Last Modified Date
                        </label>
                        <div
                          class="slds-form-element__control input-style-size slds-var-p-bottom_x-small"
                        >
                          <lightning-formatted-date-time
                            value={subscriber.SystemModstamp}
                            year="numeric"
                            month="numeric"
                            day="numeric"
                            hour="2-digit"
                            minute="2-digit"
                            time-zone-name="short"
                            hour12="true"
                          ></lightning-formatted-date-time>
                        </div>
                      </div>
                    </template>
                  </template>
                </div>
              </div>
            </lightning-tab>
            <lightning-tab
              label="Modify License"
              value="modify-license"
              icon-name="standard:record_update"
              onactive={handleTabActive}
              class="tab-style"
            >
              <div
                class="slds-grid slds-gutters slds-wrap slds-var-p-around_medium"
              >
                <template if:false={displayEditView}>
                  <div class="slds-col slds-var-p-around_small">
                    <template if:false={expirationToggle}>
                      <lightning-input
                        type="toggle"
                        label="Does not Expire"
                        name="expire"
                        disabled
                        message-toggle-active=""
                        message-toggle-inactive=""
                      ></lightning-input>
                    </template>
                    <template if:true={expirationToggle}>
                      <lightning-input
                        type="toggle"
                        label="Does not Expire"
                        name="expire"
                        checked
                        disabled
                        message-toggle-active=""
                        message-toggle-inactive=""
                      ></lightning-input>
                    </template>
                    <lightning-input
                      type="date"
                      class="expirationDate"
                      label="Expiration Date"
                      disabled
                      value={modifyExpirationDate}
                      min={nowDate}
                    ></lightning-input>
                    <lightning-combobox
                      label="Status"
                      value={licenseStatus}
                      options={statusOptions}
                      onchange={handleStatusChange}
                      disabled
                    ></lightning-combobox>
                  </div>
                  <div class="slds-col slds-var-p-around_small">
                    <template if:true={isSiteLicense}>
                      <lightning-input
                        type="toggle"
                        label="Site License"
                        checked
                        disabled
                        message-toggle-active=""
                        message-toggle-inactive=""
                      ></lightning-input>
                    </template>
                    <template if:false={isSiteLicense}>
                      <lightning-input
                        type="toggle"
                        label="Site License"
                        disabled
                        message-toggle-active=""
                        message-toggle-inactive=""
                      ></lightning-input>
                    </template>
                    <lightning-input
                      type="number"
                      disabled
                      value={modifySeats}
                      label="Seats"
                      max="99000000"
                      class="seats"
                      min="0"
                    ></lightning-input>
                    <template if:true={usedLicenses}>
                      <lightning-input
                        type="number"
                        value={usedLicenses}
                        label="Used Licenses"
                        disabled
                      ></lightning-input>
                    </template>
                  </div>
                </template>
                <template if:true={displayEditView}>
                  <div class="slds-col slds-var-p-around_small">
                    <template if:false={expirationToggle}>
                      <lightning-input
                        type="toggle"
                        label="Does not Expire"
                        name="expire"
                        onchange={handleExpirationToggle}
                        message-toggle-active=""
                        message-toggle-inactive=""
                      ></lightning-input>
                    </template>
                    <template if:true={expirationToggle}>
                      <lightning-input
                        type="toggle"
                        label="Does not Expire"
                        name="expire"
                        checked
                        onchange={handleExpirationToggle}
                        message-toggle-active=""
                        message-toggle-inactive=""
                      ></lightning-input>
                    </template>
                    <lightning-input
                      type="date"
                      class="expirationDate"
                      label="Expiration Date"
                      disabled={expirationToggle}
                      value={modifyExpirationDate}
                      onchange={handleExpirationChange}
                      min={nowDate}
                    ></lightning-input>
                    <lightning-combobox
                      label="Status"
                      value={licenseStatus}
                      options={statusOptions}
                      onchange={handleStatusChange}
                    ></lightning-combobox>
                  </div>
                  <div class="slds-col slds-var-p-around_small">
                    <template if:true={isSiteLicense}>
                      <lightning-input
                        type="toggle"
                        label="Site License"
                        checked
                        onchange={handleSeatsToggle}
                        message-toggle-active=""
                        message-toggle-inactive=""
                      ></lightning-input>
                    </template>
                    <template if:false={isSiteLicense}>
                      <lightning-input
                        type="toggle"
                        label="Site License"
                        onchange={handleSeatsToggle}
                        message-toggle-active=""
                        message-toggle-inactive=""
                      ></lightning-input>
                    </template>
                    <lightning-input
                      type="number"
                      disabled={seatsToggle}
                      value={modifySeats}
                      label="Seats"
                      onchange={handleSeatsChange}
                      max="99000000"
                      min="0"
                      class="seats"
                    ></lightning-input>
                    <template if:true={usedLicenses}>
                      <lightning-input
                        type="number"
                        value={usedLicenses}
                        label="Used Licenses"
                        disabled
                      ></lightning-input>
                    </template>
                  </div>
                </template>
              </div>
              <template if:true={displayEditView}>
                <div class="slds-modal__footer">
                  <div class="slds-align_absolute-center">
                    <lightning-button
                      label="Cancel"
                      title="Cancel"
                      onclick={handleModifyLicenseCancel}
                      class="slds-var-m-left_x-small"
                    ></lightning-button>
                    <lightning-button
                      variant="brand"
                      label="Save"
                      title="Save"
                      onclick={handleModifyLicenseSave}
                      class="slds-var-m-left_x-small"
                    ></lightning-button>
                  </div>
                </div>
              </template>
            </lightning-tab>
            <lightning-tab
              label="Activity Timeline"
              value="activity-timeline"
              icon-name="standard:feed"
              onactive={handleTabActive}
            >
              <div class="slds-var-p-around_small">
                <template if:true={displayActivityTimelineSpinner}>
                  <lightning-spinner
                    alternative-text="Loading"
                    size="medium"
                    variant="brand"
                  ></lightning-spinner>
                </template>
                <template if:true={activityTimelineNotAvailableView}>
                  <lightning-empty-state
                    title="Hmm…"
                    illustration-name="noresults:search"
                  >
                    <p slot="description">
                      We were unable to retrieve any Activity Timeline history
                      for this license...
                    </p>
                  </lightning-empty-state>
                </template>
                <template if:false={activityTimelineNotAvailableView}>
                  <div
                    class="slds-border_left slds-border_bottom slds-border_right slds-border_top timeline-card-style"
                  >
                    <lightning-card class="slds-m-bottom_none">
                      <div
                        class="timeline-style slds-card__body slds-card__body_inner"
                      >
                        <ul class="slds-timeline">
                          <template
                            for:each={licenseTimelineData}
                            for:item="step"
                            for:index="index"
                          >
                            <c-package-lma-history
                              key={step.Id}
                              created-date={step.CreatedDate}
                              field={step.Field}
                              new-value={step.NewValue}
                              old-value={step.OldValue}
                            >
                            </c-package-lma-history>
                          </template>
                        </ul>
                      </div>
                      <p slot="footer">
                        <a href={viewMoreLink} target="_blank">View More</a>
                      </p>
                    </lightning-card>
                  </div>
                </template>
              </div>
            </lightning-tab>
            <lightning-tab
              label="AppAnalytics Requests"
              value="app-analytics"
              icon-name="standard:story"
              onactive={handleTabActive}
            >
              <div class="slds-var-p-around_small">
                <template if:true={displayAppAnalyticsSpinner}>
                  <lightning-spinner
                    alternative-text="Loading"
                    size="medium"
                    variant="brand"
                  ></lightning-spinner>
                </template>
                <template if:true={appAnalyticsNotAvailableView}>
                  <lightning-empty-state
                    title="Hmm…"
                    illustration-name="noresults:search"
                  >
                    <p slot="description">
                      We were unable to retrieve any AppAnalytics requests for
                      this subscriber from the past 24 hours...
                    </p>
                    <lightning-button
                      variant="brand"
                      label="Refresh"
                      slot="cta"
                      onclick={handleAppAnalyticsRefresh}
                    ></lightning-button>
                  </lightning-empty-state>
                </template>
                <template if:false={appAnalyticsNotAvailableView}>
                  <div class="slds-scrollable_y requests-list">
                    <template
                      for:each={appAnalyticsData}
                      for:item="app"
                      for:index="index"
                    >
                      <c-docked-app-analytics-bar
                        key={app.Id}
                        name={app.Name}
                        type={app.DataType}
                        request-state={app.RequestState}
                        app-data-type={app.DataType}
                        download-size={app.DownloadSize}
                        end-time={app.EndTime}
                        start-time={app.StartTime}
                        download-expiration-time={app.DownloadExpirationTime}
                        download-url={app.DownloadUrl}
                        error-message={app.ErrorMessage}
                        file-type={app.FileType}
                        file-compression={app.FileCompression}
                        query-submitted-time={app.QuerySubmittedTime}
                        organization-ids={app.OrganizationIds}
                        package-ids={app.PackageIds}
                        onexpand={handleAppAnalyticsExpand}
                        onrefresh={handleAppAnalyticsRefresh}
                      ></c-docked-app-analytics-bar>
                    </template>
                  </div>
                </template>
              </div>
            </lightning-tab>
          </lightning-tabset>
        </template>
      </template>
      <template lwc:else>
        <template if:false={displaySpinner}>
          <div class="slds-p-around_medium">
            <lightning-empty-state
              title="Hmm…"
              illustration-name="noresults:search"
            >
              <p slot="description">
                It looks like the Package Subscriber Feature is disabled. Please
                reach out to the Package Owner for further assistance...
              </p>
            </lightning-empty-state>
          </div>
        </template>
      </template>
      <template lwc:if={displayIllustration}>
        <div class="slds-p-around_medium">
          <lightning-empty-state
            title="Hmm…"
            illustration-name="noresults:search"
          >
            <p slot="description">
              We were unable to retreive package subscriber details...
            </p>
          </lightning-empty-state>
        </div>
      </template>
    </div>
  </lightning-card>
  <template if:true={displayAppAnalyticsModal}>
    <c-app-analytics-flow-modal
      header="Request AppAnalytics"
      subscriber-package-id={subscriber.metadataPackageId}
      subscribers={subscribers}
      oncancel={handleAppAnalyticsCloseModal}
      onrefresh={handleAppAnalyticsSubmitted}
    ></c-app-analytics-flow-modal>
  </template>
  <template if:true={displayAppAnalyticsViewModal}>
    <template if:true={appAnalyticsViewData}>
      <c-app-analytics-request-modal
        view-data={appAnalyticsViewData}
        oncancel={handleViewCloseModal}
      ></c-app-analytics-request-modal>
    </template>
  </template>
</template>
