<template>
  <lightning-tabset variant="scoped">
    <lightning-tab label="Manageability Rules" icon-name="standard:table">
      <div
        class="slds-progress slds-progress_vertical slds-progress_success slds-p-around_x-small"
      >
        <ol class="slds-progress__list slds-progress__list-bordered">
          <li class="slds-progress__item">
            <span
              class="slds-icon_container slds-icon-utility-success slds-progress__marker"
            >
              <lightning-icon
                icon-name="utility:info_alt"
                variant="info"
                size="x-small"
                class="success-icon-style"
              ></lightning-icon>
            </span>
            <div
              class="slds-progress__item_content slds-grid slds-grid_align-spread"
            >
              <div class="slds-size_3-of-4">
                Review the cheat sheet for all the metadata components that you
                can package with Data360
              </div>
              <div class="slds-grid slds-grid_align-end slds-size_1-of-4">
                <lightning-button-icon
                  icon-name="utility:help_doc_ext"
                  variant="brand"
                  onclick={navigateToDataCloudPackagingCheatSheet}
                ></lightning-button-icon>
              </div>
            </div>
          </li>
          <li class="slds-progress__item">
            <span
              class="slds-icon_container slds-icon-utility-success slds-progress__marker"
            >
              <lightning-icon
                icon-name="utility:info_alt"
                variant="info"
                size="x-small"
                class="success-icon-style"
              ></lightning-icon>
            </span>
            <div
              class="slds-progress__item_content slds-grid slds-grid_align-spread"
            >
              <div class="slds-size_3-of-4">
                Review the workflow for developing, distributing and managing
                Data360 metadata
              </div>
              <div class="slds-grid slds-grid_align-end slds-size_1-of-4">
                <lightning-button-icon
                  icon-name="utility:help_doc_ext"
                  variant="brand"
                  onclick={navigateToDataCloudWorkflow}
                ></lightning-button-icon>
              </div>
            </div>
          </li>
        </ol>
      </div>
    </lightning-tab>
    <lightning-tab label="Developer Environments" icon-name="standard:apex">
      <lightning-tabset variant="scoped">
        <lightning-tab label="Scratch Orgs" icon-name="standard:default">
          <div
            class="slds-scoped-notification slds-media slds-media_center slds-theme_info slds-m-bottom_small"
            role="status"
          >
            <div class="slds-media__figure">
              <lightning-icon
                size="small"
                icon-name="utility:info"
                variant="inverse"
              ></lightning-icon>
            </div>
            <div class="slds-media__body">
              <p>
                Log a case via the&nbsp;
                <a target="_blank" href="https://partners.salesforce.com/"
                  >Partner Community</a
                >&nbsp; to enable Data 360 in scratch orgs. This feature is
                available only through a Partner Business Org (PBO) Dev Hub.
              </p>
            </div>
          </div>
          <div
            class="slds-border_top slds-border_right slds-border_bottom slds-border_left"
          >
            <c-scratch-def-file-build-card
              template-key="dataCloud"
              auto-confirm-settings={autoConfirmSettings}
            ></c-scratch-def-file-build-card>
          </div>
        </lightning-tab>
        <lightning-tab
          label="Developer &amp; Demo Orgs "
          icon-name="standard:default"
        >
          <template lwc:if={orgId}>
            <div
              class="slds-scoped-notification slds-media slds-media_center slds-theme_info slds-m-bottom_small"
              role="status"
            >
              <div class="slds-media__figure">
                <lightning-icon
                  size="small"
                  icon-name="utility:skill"
                  variant="inverse"
                ></lightning-icon>
              </div>
              <div class="slds-media__body">
                <ul class="slds-list_dotted">
                  <li>
                    Log a case via the&nbsp;
                    <a target="_blank" href="https://partners.salesforce.com/"
                      >Partner Community</a
                    >&nbsp;to provision the following licenses and features for
                    your org - <code>{orgId}</code>
                  </li>
                  <li>
                    Available for ISV tiers Exploration and above.&nbsp;
                    <a
                      target="_blank"
                      href="https://partners.salesforce.com/pdx/s/learn/article/appexchange-partner-program-MC5PXFRKELXJD3HGJKJJQCKNPI5A?language=en_US"
                      >Learn More</a
                    >
                  </li>
                </ul>
              </div>
            </div>
          </template>
          <lightning-icon
            icon-name="utility:settings"
            size="x-small"
            class="slds-m-right_xx-small"
          ></lightning-icon>
          Features:
          <ul class="slds-list_dotted">
            <li>Data360</li>
          </ul>
        </lightning-tab>
      </lightning-tabset>
    </lightning-tab>
  </lightning-tabset>
</template>
