<template>
  <lightning-tabset variant="scoped">
    <lightning-tab
      label="Developer Environments"
      icon-name="standard:slack_conversations"
    >
      <div
        class="slds-progress slds-progress_vertical slds-progress_success slds-p-around_x-small"
      >
        <ol class="slds-progress__list slds-progress__list-bordered">
          <li class="slds-progress__item">
            <span
              class="slds-icon_container slds-icon-utility-success slds-progress__marker"
            >
              <lightning-icon
                icon-name="utility:info_alt"
                variant="info"
                size="x-small"
                class="success-icon-style"
              ></lightning-icon>
            </span>
            <div
              class="slds-progress__item_content slds-grid slds-grid_align-spread"
            >
              <div class="slds-size_3-of-4">
                Join the Slack Developer Program for the latest development
                updates, exclusive access to tooling, and resources created to
                help developers build and grow.
              </div>
              <div class="slds-grid slds-grid_align-end slds-size_1-of-4">
                <lightning-button-icon
                  icon-name="utility:help_doc_ext"
                  variant="brand"
                  onclick={navigateToSlackDeveloperProgram}
                ></lightning-button-icon>
              </div>
            </div>
          </li>
          <li class="slds-progress__item">
            <span
              class="slds-icon_container slds-icon-utility-success slds-progress__marker"
            >
              <lightning-icon
                icon-name="utility:info_alt"
                variant="info"
                size="x-small"
                class="success-icon-style"
              ></lightning-icon>
            </span>
            <div
              class="slds-progress__item_content slds-grid slds-grid_align-spread"
            >
              <div class="slds-size_3-of-4">
                Leverage Partner Sandboxes are enhanced testing environments
                perfect for client-facing demos and proof-of-concept development
              </div>
              <div class="slds-grid slds-grid_align-end slds-size_1-of-4">
                <lightning-button-icon
                  icon-name="utility:help_doc_ext"
                  variant="brand"
                  onclick={navigateToPartnerSandboxes}
                ></lightning-button-icon>
              </div>
            </div>
          </li>
        </ol>
      </div>
    </lightning-tab>
  </lightning-tabset>
</template>
