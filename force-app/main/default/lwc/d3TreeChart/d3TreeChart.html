<template>
  <div class="chart-box">
    <!-- Loading State -->
    <template if:true={displaySpinner}>
      <div class="loading-overlay">
        <lightning-spinner
          alternative-text="Loading visualization..."
          size="medium"
          variant="brand"
        ></lightning-spinner>
      </div>
    </template>

    <!-- Main Visualization -->
    <template if:true={treeData}>
      <div class="d3" lwc:dom="manual"></div>
    </template>
    
    <!-- Enhanced Error State -->
    <template if:false={displaySpinner}>
      <template if:false={treeData}>
        <div class="error-state">
          <lightning-empty-state title="Visualization Unavailable"  illustration-name="error:connectionissue">
            <p slot="description">{errorBody}</p>
          </lightning-empty-state>
        </div>
      </template>
    </template>
  </div>
</template>
