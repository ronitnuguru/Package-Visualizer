<template>
  <section
    role="dialog"
    tabindex="-1"
    class="slds-modal slds-fade-in-open slds-modal_medium slds-app-launcher"
    aria-labelledby="header43"
    aria-modal="true"
    aria-describedby="modal-content-id-1"
  >
    <div class="slds-modal__container">
      <header
        class="slds-modal__header slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-grid_align-center"
      >
        <button
          class="slds-button slds-button_icon slds-modal__close"
          title="Close"
          onclick={handleCancel}
        >
          <lightning-icon
            size="small"
            icon-name="utility:close"
            alternative-text="Close"
            title="Close"
          ></lightning-icon>
          <span class="slds-assistive-text">Close</span>
        </button>
        <h2
          class="slds-text-heading_medium slds-show_medium"
          style="font-weight: 400"
        >
          Package Launcher
        </h2>
        <div class="slds-app-launcher__header-search">
          <lightning-input
            placeholder="Find a Package"
            type="search"
            variant="label-hidden"
            onchange={handleSearchInputChange}
          ></lightning-input>
        </div>
        <lightning-button-group>
          <lightning-button
            label="AppExchange"
            icon-name="utility:cart"
            class="slds-show_medium"
            onclick={launchAppx}
          ></lightning-button>
          <lightning-button
            label="AgentExchange"
            icon-name="utility:agent_astro"
            class="slds-show_medium"
            onclick={launchAgentx}
          ></lightning-button>
        </lightning-button-group>
      </header>
      <div
        class="slds-modal__content slds-app-launcher__content slds-var-p-around_medium"
        id="modal-content-id-1"
      >
        <div class={allPackagesAccordionClass}>
          <h3 class="slds-section__title">
            <button
              aria-controls="appsContent"
              aria-expanded="true"
              class="slds-button slds-section__title-action"
              onclick={toggleAllPackagesAccordion}
            >
              <template if:true={displayAllPackages}>
                <lightning-icon
                  size="x-small"
                  icon-name="utility:switch"
                  class="slds-var-p-right_xx-small"
                ></lightning-icon>
              </template>
              <template if:false={displayAllPackages}>
                <lightning-icon
                  size="x-small"
                  icon-name="utility:chevronright"
                  class="slds-var-p-right_xx-small"
                ></lightning-icon>
              </template>
              <span class="slds-truncate">All Packages</span>
            </button>
          </h3>
          <div
            aria-hidden="false"
            class="slds-section__content slds-var-p-around_medium"
            id="appsContent"
          >
            <template if:true={is2GP}>
              <fieldset
                class="slds-form-element slds-var-p-bottom_small"
                role="radiogroup"
              >
                <legend class="slds-assistive-text">
                  Filter packages by type
                </legend>
                <div
                  class="slds-form-element__control slds-grid slds-wrap slds-gutters"
                >
                  <div
                    class="slds-col slds-align_absolute-center slds-p-around_x-small"
                  >
                    <div class="slds-visual-picker slds-visual-picker_vertical">
                      <input
                        type="radio"
                        id="type-managed"
                        name="package-type-filter"
                        data-type="Managed"
                        checked={isManagedSelected}
                        onclick={handleTypeFilter}
                      />
                      <label for="type-managed">
                        <span
                          class="slds-visual-picker__figure slds-visual-picker__text slds-align_absolute-center"
                        >
                          <span>
                            <lightning-layout
                              vertical-align="center"
                              class="slds-m-bottom_x-small"
                            >
                              <lightning-layout-item
                                class="slds-m-right_x-small"
                              >
                                <lightning-icon
                                  icon-name="standard:solution"
                                  alternative-text="Managed packages"
                                  size="medium"
                                ></lightning-icon>
                              </lightning-layout-item>
                              <lightning-layout-item
                                class="slds-m-right_x-small"
                              >
                                <span class="slds-text-heading_small">
                                  Managed
                                </span>
                              </lightning-layout-item>
                              <lightning-layout-item>
                                <lightning-badge
                                  label={managedCount}
                                  class="slds-theme_inverse"
                                ></lightning-badge>
                              </lightning-layout-item>
                            </lightning-layout>
                            <span class="slds-text-title">
                              Distribute namespaced solutions and deliver
                              controlled upgrades to subscribers.
                            </span>
                          </span>
                        </span>
                        <span
                          class="slds-icon_container slds-visual-picker__text-check"
                        >
                          <lightning-icon
                            icon-name="utility:check"
                            alternative-text="check"
                            title="check"
                            size="x-small"
                            variant="bare"
                          ></lightning-icon>
                        </span>
                      </label>
                    </div>
                  </div>
                  <div
                    class="slds-col slds-align_absolute-center slds-p-around_x-small"
                  >
                    <div class="slds-visual-picker slds-visual-picker_vertical">
                      <input
                        type="radio"
                        id="type-unlocked"
                        name="package-type-filter"
                        data-type="Unlocked"
                        checked={isUnlockedSelected}
                        onclick={handleTypeFilter}
                      />
                      <label for="type-unlocked">
                        <span
                          class="slds-visual-picker__figure slds-visual-picker__text slds-align_absolute-center"
                        >
                          <span>
                            <lightning-layout
                              vertical-align="center"
                              class="slds-m-bottom_x-small"
                            >
                              <lightning-layout-item
                                class="slds-m-right_x-small"
                              >
                                <lightning-icon
                                  icon-name="custom:custom76"
                                  alternative-text="Unlocked packages"
                                  size="medium"
                                ></lightning-icon>
                              </lightning-layout-item>
                              <lightning-layout-item
                                class="slds-m-right_x-small"
                              >
                                <span class="slds-text-heading_small">
                                  Unlocked
                                </span>
                              </lightning-layout-item>
                              <lightning-layout-item>
                                <lightning-badge
                                  label={unlockedCount}
                                  class="slds-theme_inverse"
                                ></lightning-badge>
                              </lightning-layout-item>
                            </lightning-layout>
                            <span class="slds-text-title">
                              Organize internal metadata in flexible packages
                              that can be modified after installation.
                            </span>
                          </span>
                        </span>
                        <span
                          class="slds-icon_container slds-visual-picker__text-check"
                        >
                          <lightning-icon
                            icon-name="utility:check"
                            alternative-text="check"
                            title="check"
                            size="x-small"
                            variant="bare"
                          ></lightning-icon>
                        </span>
                      </label>
                    </div>
                  </div>
                </div>
              </fieldset>
            </template>
            <template if:true={packageFilterList}>
              <template if:true={hasDisplayedPackages}>
                <ul class="slds-grid slds-grid_pull-padded slds-wrap">
                  <template for:each={displayedPackages} for:item="row">
                    <li
                      class="slds-var-p-horizontal_small slds-size_1-of-1 slds-medium-size_1-of-3"
                      key={row.pkg.id}
                      data-id={row.index}
                      data-name={row.pkg.name}
                      onclick={handlePackageClick}
                    >
                      <div class="slds-app-launcher__tile slds-text-link_reset">
                        <div
                          class="slds-app-launcher__tile-figure slds-align_absolute-center"
                        >
                          <span class="slds-avatar slds-avatar_large">
                            <c-package-icon
                              icon={row.pkg.containerOptions}
                              namespace-prefix={row.pkg.namespacePrefix}
                            >
                            </c-package-icon>
                          </span>
                        </div>
                        <div class="slds-app-launcher__tile-body slds-truncate">
                          <template if:false={row.pkg.description}>
                            <div class="slds-var-p-top_medium"></div>
                          </template>
                          <a href="#" class="slds-text-heading_small"
                            >{row.pkg.name}</a
                          >
                          <p class="slds-line-clamp_x-small">
                            {row.pkg.description}
                          </p>
                        </div>
                      </div>
                    </li>
                  </template>
                </ul>
              </template>
              <template if:false={hasDisplayedPackages}>
                <div class="slds-text-heading_small">
                  <lightning-empty-state
                    title="Hmm…"
                    illustration-name="noresults:search"
                  >
                    <p slot="description">
                      No packages match the current filter...
                    </p>
                  </lightning-empty-state>
                </div>
              </template>
            </template>
            <template if:false={packageFilterList}>
              <div class="slds-text-heading_small">
                <lightning-empty-state
                  title="Hmm…"
                  illustration-name="noresults:search"
                >
                  <p slot="description">
                    We were unable to retrieve any 2GP Packages associated with
                    this org...
                  </p>
                </lightning-empty-state>
              </div>
            </template>
          </div>
        </div>
        <hr />
        <div class={allDockedItemsAccordionClass}>
          <h3 class="slds-section__title">
            <button
              aria-controls="dockedItemsContent"
              aria-expanded="true"
              class="slds-button slds-section__title-action"
              onclick={toggleAllDockedItemsAccordion}
            >
              <template if:true={displayAllDockedItems}>
                <lightning-icon
                  size="x-small"
                  icon-name="utility:switch"
                  class="slds-var-p-right_xx-small"
                ></lightning-icon>
              </template>
              <template if:false={displayAllDockedItems}>
                <lightning-icon
                  size="x-small"
                  icon-name="utility:chevronright"
                  class="slds-var-p-right_xx-small"
                ></lightning-icon>
              </template>
              <span class="slds-truncate">All Docked Utility Items</span>
            </button>
          </h3>
          <div
            aria-hidden="false"
            class="slds-section__content slds-var-p-around_medium"
            id="dockedItemsContent"
          >
            <ul class="slds-grid slds-grid_pull-padded slds-wrap">
              <li
                class="slds-var-p-horizontal_small slds-size_1-of-1 slds-medium-size_1-of-3"
                onclick={handleDockedLimitsClick}
              >
                <div class="slds-app-launcher__tile slds-text-link_reset">
                  <div
                    class="slds-app-launcher__tile-figure slds-align_absolute-center"
                  >
                    <span class="slds-avatar slds-avatar_medium">
                      <lightning-icon
                        icon-name="standard:metrics"
                      ></lightning-icon>
                    </span>
                  </div>
                  <div class="slds-app-launcher__tile-body slds-truncate">
                    <div class="slds-var-p-top_x-small"></div>
                    <a
                      href="#"
                      class="slds-text-heading_small slds-var-p-top_medium"
                      >Limits</a
                    >
                  </div>
                </div>
              </li>
              <li
                class="slds-var-p-horizontal_small slds-size_1-of-1 slds-medium-size_1-of-3"
                onclick={handleDockedResourcesClick}
              >
                <div class="slds-app-launcher__tile slds-text-link_reset">
                  <div
                    class="slds-app-launcher__tile-figure slds-align_absolute-center"
                  >
                    <span class="slds-avatar slds-avatar_medium">
                      <lightning-icon
                        icon-name="standard:article"
                      ></lightning-icon>
                    </span>
                  </div>
                  <div class="slds-app-launcher__tile-body slds-truncate">
                    <div class="slds-var-p-top_x-small"></div>
                    <a href="#" class="slds-text-heading_small">Resources</a>
                  </div>
                </div>
              </li>
              <template if:true={is2GP}>
                <li
                  class="slds-var-p-horizontal_small slds-size_1-of-1 slds-medium-size_1-of-3"
                  onclick={handleAppAnalyticsClick}
                >
                  <div class="slds-app-launcher__tile slds-text-link_reset">
                    <div
                      class="slds-app-launcher__tile-figure slds-align_absolute-center"
                    >
                      <span class="slds-avatar slds-avatar_medium">
                        <lightning-icon
                          icon-name="standard:story"
                        ></lightning-icon>
                      </span>
                    </div>
                    <div class="slds-app-launcher__tile-body slds-truncate">
                      <div class="slds-var-p-top_x-small"></div>
                      <a href="#" class="slds-text-heading_small"
                        >AppAnalytics Requests</a
                      >
                    </div>
                  </div>
                </li>
              </template>
              <li
                class="slds-var-p-horizontal_small slds-size_1-of-1 slds-medium-size_1-of-3"
                onclick={handleAnnouncementsClick}
              >
                <div class="slds-app-launcher__tile slds-text-link_reset">
                  <div
                    class="slds-app-launcher__tile-figure slds-align_absolute-center"
                  >
                    <span class="slds-avatar slds-avatar_medium">
                      <lightning-icon
                        icon-name="standard:announcement"
                      ></lightning-icon>
                    </span>
                  </div>
                  <div class="slds-app-launcher__tile-body slds-truncate">
                    <div class="slds-var-p-top_x-small"></div>
                    <a href="#" class="slds-text-heading_small"
                      >Announcements</a
                    >
                  </div>
                </div>
              </li>
              <li
                class="slds-var-p-horizontal_small slds-size_1-of-1 slds-medium-size_1-of-3"
                onclick={handleTrailheadClick}
              >
                <div class="slds-app-launcher__tile slds-text-link_reset">
                  <div
                    class="slds-app-launcher__tile-figure slds-align_absolute-center"
                  >
                    <span class="slds-avatar slds-avatar_medium">
                      <lightning-icon
                        icon-name="standard:trailhead_alt"
                      ></lightning-icon>
                    </span>
                  </div>
                  <div class="slds-app-launcher__tile-body slds-truncate">
                    <div class="slds-var-p-top_x-small"></div>
                    <a href="#" class="slds-text-heading_small">Trailhead</a>
                  </div>
                </div>
              </li>
              <li
                class="slds-var-p-horizontal_small slds-size_1-of-1 slds-medium-size_1-of-3"
                onclick={handleCreateOrgsClick}
              >
                <div class="slds-app-launcher__tile slds-text-link_reset">
                  <div
                    class="slds-app-launcher__tile-figure slds-align_absolute-center"
                  >
                    <span class="slds-avatar slds-avatar_medium">
                      <lightning-icon
                        icon-name="standard:default"
                      ></lightning-icon>
                    </span>
                  </div>
                  <div class="slds-app-launcher__tile-body slds-truncate">
                    <div class="slds-var-p-top_x-small"></div>
                    <a
                      href="#"
                      class="slds-text-heading_small slds-var-p-top_medium"
                      >Create Orgs</a
                    >
                  </div>
                </div>
              </li>
            </ul>
          </div>
        </div>
        <hr />
        <template if:true={isSetupEnabled}>
          <div class={allItemsAccordionClass}>
            <h3 class="slds-section__title">
              <button
                aria-controls="itemsContent"
                aria-expanded="true"
                class="slds-button slds-section__title-action"
                onclick={toggleAllItemsAccordion}
              >
                <template if:true={displayAllItems}>
                  <lightning-icon
                    size="x-small"
                    icon-name="utility:switch"
                    class="slds-var-p-right_xx-small"
                  ></lightning-icon>
                </template>
                <template if:false={displayAllItems}>
                  <lightning-icon
                    size="x-small"
                    icon-name="utility:chevronright"
                    class="slds-var-p-right_xx-small"
                  ></lightning-icon>
                </template>
                <span class="slds-truncate">All Setup Items</span>
              </button>
            </h3>
            <div
              aria-hidden="false"
              class="slds-section__content slds-var-p-around_medium"
              id="itemsContent"
            >
              <ul class="slds-grid slds-grid_pull-padded slds-wrap">
                <template
                  for:each={packageLauncherItems}
                  for:item="item"
                  for:index="index"
                >
                  <li
                    class="slds-var-p-horizontal_small slds-size_1-of-2 slds-medium-size_1-of-4"
                    key={item.label}
                  >
                    <a href={item.link} class="slds-truncate">{item.label}</a>
                  </li>
                </template>
              </ul>
            </div>
          </div>
        </template>
      </div>
    </div>
  </section>
  <div class="slds-backdrop slds-backdrop_open"></div>
</template>
