<template>
  <lightning-tabset variant="scoped">
    <lightning-tab label="Manageability Rules" icon-name="standard:table">
      <div class="">
        <lightning-datatable
          key-field="id"
          data={data}
          columns={columns}
          hide-checkbox-column
        ></lightning-datatable>
      </div>
    </lightning-tab>
    <lightning-tab label="Developer Environments" icon-name="standard:apex">
      <lightning-card hide-header>
        <lightning-tabset variant="scoped">
          <lightning-tab label="Scratch Orgs" icon-name="standard:default">
            <div
              class="slds-border_top slds-border_right slds-border_bottom slds-border_left"
            >
              <c-scratch-def-file-build-card
                template-key="agentforce"
                auto-confirm-settings={autoConfirmSettings}
              ></c-scratch-def-file-build-card>
            </div>
          </lightning-tab>
          <lightning-tab
            label="Developer &amp; Demo Orgs "
            icon-name="standard:default"
          >
            <template lwc:if={orgId}>
              <div
                class="slds-scoped-notification slds-media slds-media_center slds-theme_info slds-m-bottom_small"
                role="status"
              >
                <div class="slds-media__figure">
                  <lightning-icon
                    size="small"
                    icon-name="utility:skill"
                    variant="inverse"
                  ></lightning-icon>
                </div>
                <div class="slds-media__body">
                  <p>
                    Log a case via&nbsp;
                    <a target="_blank" href="https://partners.salesforce.com/"
                      >Partner Community</a
                    >
                    &nbsp;to provision the following licenses and features for
                    your org - <code>{orgId}</code>
                  </p>
                </div>
              </div>
            </template>
            <lightning-icon
              icon-name="utility:settings"
              size="x-small"
              class="slds-m-right_xx-small"
            ></lightning-icon>
            Features:
            <ul class="slds-list_dotted">
              <li>Agentforce</li>
            </ul>
          </lightning-tab>
        </lightning-tabset>
      </lightning-card>
    </lightning-tab>
  </lightning-tabset>
</template>
