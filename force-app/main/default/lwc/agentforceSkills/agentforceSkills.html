<template>
  <div
    class="slds-border_top slds-border_right slds-border_bottom slds-border_left slds-box slds-box_xx-small"
  >
    <lightning-card>
      <h3 slot="title" class="slds-truncate">
        <lightning-icon
          icon-name="standard:dx_pipeline"
          size="medium"
          class="slds-m-right_small"
        ></lightning-icon>
        Skills Library
      </h3>
      <lightning-button-group slot="actions">
        <lightning-button-icon
          icon-name="utility:robot"
          variant="border-filled"
          tooltip="Agent Skills"
          onclick={handleAgentSkills}
        ></lightning-button-icon>
        <lightning-button-icon
          icon-name="utility:path_experiment"
          tooltip="Salesforce Skills"
          variant="border-filled"
          onclick={handleAgentforceLabs}
        ></lightning-button-icon>
      </lightning-button-group>
      <div class="slds-card__body slds-card__body_inner">
        <template for:each={skills} for:item="skill" for:index="index">
          <div
            class="card-style slds-var-m-bottom_small slds-border_top slds-border_right slds-border_bottom slds-border_left slds-box slds-box_xx-small"
            key={skill.id}
          >
            <lightning-card variant="narrow">
              <h3 slot="title" class="slds-truncate" title={skill.name}>
                <lightning-icon
                  icon-name="standard:skill_requirement"
                  size="small"
                  class="slds-m-right_small"
                ></lightning-icon>
                {skill.name}
              </h3>
              <div
                slot="actions"
                class="slds-grid slds-grid_vertical-align-center"
              >
                <lightning-badge
                  label={skill.createdBy}
                  class="slds-m-right_x-small slds-theme_inverse"
                ></lightning-badge>
                <lightning-button-icon
                  icon-name="utility:dx_change_request"
                  variant="border-filled"
                  data-index={index}
                  onclick={navigateToSkillGithub}
                ></lightning-button-icon>
              </div>
              <div class="slds-card__body_inner">
                <div>{skill.description}</div>
                <div class="slds-text-title_caps slds-m-top_x-small">
                  Best For:
                </div>
                <ul class="slds-list_dotted">
                  <li>{skill.bestFor}</li>
                </ul>
                <template lwc:if={skill.cli}>
                  <div
                    class="slds-grid slds-grid_vertical-align-center slds-m-top_x-small slds-m-right_xx-small"
                  >
                    <pre
                      class="agentscript-pre slds-col"
                    ><code class="agentscript-code">{skill.cli}</code></pre>
                    <lightning-button-icon
                      icon-name="utility:copy"
                      variant="border-filled"
                      class="slds-m-left_x-small"
                      data-index={index}
                      onclick={handleCopySkillCli}
                    ></lightning-button-icon>
                  </div>
                </template>
              </div>
            </lightning-card>
          </div>
        </template>
      </div>
    </lightning-card>
  </div>
</template>
