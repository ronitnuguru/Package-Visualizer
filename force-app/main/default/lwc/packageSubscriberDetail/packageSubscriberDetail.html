<template>
  <div class="slds-var-p-around_small">
    <template if:true={orgKey}>
      <div
        class="slds-border_top slds-border_right slds-border_bottom slds-border_left slds-box slds-box_xx-small"
      >
        <lightning-card>
          <h3 slot="title" class="slds-truncate">
            <lightning-icon
              icon-name="standard:customer"
              size="medium"
              class="slds-m-right_small"
            ></lightning-icon>
            {orgName}
          </h3>
          <lightning-button-group slot="actions">
            <template if:false={showAgentforceCard}>
              <lightning-button
                variant="brand"
                label="Generate"
                icon-name="utility:sparkles"
                icon-position="right"
                onclick={handleAskAgentforce}
              ></lightning-button>
            </template>
            <lightning-button
              variant="destructive"
              label="Block Push Upgrade"
              icon-name="utility:block_visitor"
              icon-position="right"
              onclick={handleBlockPushUpgrade}
            ></lightning-button>
            <lightning-button-icon
              variant="border-filled"
              icon-name="utility:einstein"
              tooltip="Request AppAnalytics"
              onclick={handleAppAnalyticsSubscribers}
            ></lightning-button-icon>
            <template if:true={displayLMA}>
              <template if:true={orgKey}>
                <lightning-button-icon
                  variant="border-filled"
                  icon-name="utility:questions_and_answers"
                  tooltip="Log Into Subscriber Console"
                  onclick={handleLogIntoSubscriberConsole}
                ></lightning-button-icon>
              </template>
            </template>
          </lightning-button-group>
          <div class="slds-card__body slds-card__body_inner">
            <div class="slds-grid slds-gutters slds-wrap">
              <div class="slds-col slds-size_5-of-12">
                <dl class="slds-list_horizontal slds-wrap">
                  <dt class="slds-item_label slds-text-color_weak">Type:</dt>
                  <dd class="slds-item_detail slds-truncate">{orgType}</dd>
                  <dt class="slds-item_label slds-text-color_weak">Status:</dt>
                  <dd class="slds-item_detail slds-truncate">{orgStatus}</dd>
                  <dt class="slds-item_label slds-text-color_weak">
                    Instance:
                  </dt>
                  <dd class="slds-item_detail slds-truncate">
                    <lightning-formatted-url
                      value={trustUrl}
                      label={instanceName}
                      target="_blank"
                    ></lightning-formatted-url>
                  </dd>
                  <dt class="slds-item_label slds-text-color_weak">Org ID:</dt>
                  <dd class="slds-item_detail slds-truncate">{orgKey}</dd>
                  <template if:true={parentOrg}>
                    <dt class="slds-item_label slds-text-color_weak">
                      Parent Org ID:
                    </dt>
                    <dd class="slds-item_detail slds-truncate">{parentOrg}</dd>
                  </template>
                </dl>
              </div>
              <div class="slds-col">
                <template if:true={customUpgradeTypeLabel}>
                  <dl class="slds-list_horizontal slds-wrap">
                    <dt class="slds-item_label slds-text-color_weak">
                      Custom Upgrade Type:
                    </dt>
                    <dd class="slds-item_detail slds-truncate">
                      {customUpgradeTypeLabel}
                    </dd>
                  </dl>
                </template>
                <template if:true={displayIsCustomUpgradeAllowed}>
                  <lightning-input
                    type="checkbox"
                    label="Custom Upgrade Allowed"
                    checked={isCustomUpgradeAllowed}
                    field-level-help="Indicates whether the package developer has allowed a subscriber to opt into customized push upgrades"
                    disabled
                  ></lightning-input>
                </template>
                <template if:true={displayHasRestrictionEnabled}>
                  <lightning-input
                    type="checkbox"
                    label="Restriction Enabled"
                    checked={hasRestrictionEnabled}
                    field-level-help="Indicates whether the subscriber org has blocked push upgrades"
                    disabled
                  ></lightning-input>
                </template>
              </div>
            </div>
            <template if:true={showAgentforceCard}>
              <div
                class="slds-border_top slds-border_bottom slds-border_right slds-border_left slds-m-top_medium card-style"
              >
                <lightning-card>
                  <template if:true={displayAgentforceSpinner}>
                    <div class="slds-p-vertical_medium">
                      <lightning-spinner
                        alternative-text="Loading"
                        size="medium"
                        variant="brand"
                      ></lightning-spinner>
                    </div>
                  </template>
                  <h3 slot="title" class="slds-truncate">
                    <lightning-icon
                      icon-name="standard:agent_astro"
                      size="medium"
                      class="slds-m-right_small"
                    ></lightning-icon>
                    Agentforce Generated
                  </h3>
                  <div class="slds-card__body slds-card__body_inner">
                    <template if:false={displayAgentforceSpinner}>
                      <template if:true={displayExtensionIllustration}>
                        <div class="slds-p-around_medium">
                          <lightning-empty-state
                            title="Hmm..."
                            illustration-name="noresults:search"
                          >
                            <p slot="description">
                              Looks like you may have not installed the
                              Agentforce dependent extension managed package. Or
                              you don't have the necessary permissions or
                              configuration to perform Agentforce related
                              functionalities. Please contact your admin for
                              further assistance...
                            </p>
                            <lightning-button
                              variant="brand"
                              label="Install Managed Package"
                              slot="cta"
                              onclick={handleExtensionInstall}
                            >
                            </lightning-button>
                          </lightning-empty-state>
                        </div>
                      </template>
                      <template if:false={displayExtensionIllustration}>
                        <template if:true={parsedResponse}>
                          <div class="slds-p-around_small">
                            <div
                              class="slds-grid slds-wrap slds-gutters slds-p-bottom_small"
                            >
                              <div
                                class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2"
                              >
                                <template if:true={parsedResponse.companyName}>
                                  <div
                                    class="slds-text-heading_small slds-p-bottom_x-small"
                                  >
                                    {parsedResponse.companyName}
                                  </div>
                                </template>
                                <template if:true={parsedResponse.industry}>
                                  <lightning-badge
                                    label={parsedResponse.industry}
                                    class="slds-m-right_xx-small slds-theme_inverse"
                                  ></lightning-badge>
                                </template>
                                <template if:true={parsedResponse.confidence}>
                                  <lightning-badge
                                    label={parsedResponse.confidence}
                                    class={parsedResponse.confidenceClass}
                                  ></lightning-badge>
                                </template>
                              </div>
                              <div
                                class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2"
                              >
                                <template if:true={parsedResponse.headquarters}>
                                  <div class="slds-p-bottom_xx-small">
                                    <strong>Headquarters:</strong>
                                  </div>
                                  <div class="slds-p-bottom_x-small">
                                    {parsedResponse.headquarters}
                                  </div>
                                </template>
                                <template if:true={parsedResponse.companySize}>
                                  <div class="slds-p-bottom_xx-small">
                                    <strong>Company Size:</strong>
                                  </div>
                                  <div>{parsedResponse.companySize}</div>
                                </template>
                              </div>
                            </div>
                            <dl class="slds-m-bottom_none">
                              <template
                                if:true={parsedResponse.companyOverview}
                              >
                                <dt class="slds-p-bottom_xx-small">
                                  <strong>Company Overview:</strong>
                                </dt>
                                <dd
                                  class="slds-var-m-left_none slds-p-bottom_small"
                                >
                                  {parsedResponse.companyOverview}
                                </dd>
                              </template>

                              <template if:true={parsedResponse.marketPosition}>
                                <dt class="slds-p-bottom_xx-small">
                                  <strong>Market Position:</strong>
                                </dt>
                                <dd
                                  class="slds-var-m-left_none slds-p-bottom_small"
                                >
                                  {parsedResponse.marketPosition}
                                </dd>
                              </template>

                              <template if:true={parsedResponse.whySalesforce}>
                                <dt class="slds-p-bottom_xx-small">
                                  <strong>Why Salesforce:</strong>
                                </dt>
                                <dd
                                  class="slds-var-m-left_none slds-p-bottom_small"
                                >
                                  {parsedResponse.whySalesforce}
                                </dd>
                              </template>

                              <template
                                if:true={parsedResponse.likelySalesforceClouds}
                              >
                                <dt class="slds-p-bottom_xx-small">
                                  <strong>Likely Salesforce Clouds:</strong>
                                </dt>
                                <dd
                                  class="slds-var-m-left_none slds-p-bottom_small"
                                >
                                  <template
                                    for:each={parsedResponse.likelySalesforceClouds}
                                    for:item="cloud"
                                  >
                                    <lightning-badge
                                      key={cloud}
                                      label={cloud}
                                      class="slds-m-right_xx-small slds-m-bottom_xx-small slds-theme_inverse"
                                    ></lightning-badge>
                                  </template>
                                </dd>
                              </template>

                              <template if:true={parsedResponse.idealUseCases}>
                                <dt class="slds-p-bottom_xx-small">
                                  <strong>Ideal Use Cases:</strong>
                                </dt>
                                <dd
                                  class="slds-var-m-left_none slds-p-bottom_small"
                                >
                                  <ul class="slds-list_dotted">
                                    <template
                                      for:each={parsedResponse.idealUseCases}
                                      for:item="useCase"
                                    >
                                      <li
                                        key={useCase}
                                        class="slds-p-vertical_xx-small"
                                      >
                                        {useCase}
                                      </li>
                                    </template>
                                  </ul>
                                </dd>
                              </template>

                              <template
                                if:true={parsedResponse.isvOpportunities}
                              >
                                <dt class="slds-p-bottom_xx-small">
                                  <strong>ISV Opportunities:</strong>
                                </dt>
                                <dd
                                  class="slds-var-m-left_none slds-p-bottom_small"
                                >
                                  <ul class="slds-list_dotted">
                                    <template
                                      for:each={parsedResponse.isvOpportunities}
                                      for:item="opportunity"
                                    >
                                      <li
                                        key={opportunity}
                                        class="slds-p-vertical_xx-small"
                                      >
                                        {opportunity}
                                      </li>
                                    </template>
                                  </ul>
                                </dd>
                              </template>
                            </dl>
                          </div>
                        </template>
                      </template>
                    </template>
                  </div>
                </lightning-card>
              </div>
            </template>
          </div>
        </lightning-card>
      </div>
      <template if:true={displayLMA}>
        <div class={licenseAccordionClass}>
          <h3 class="slds-section__title">
            <button
              aria-controls="licenseContent"
              aria-expanded="true"
              class="slds-button slds-section__title-action"
              onclick={toggleLicenseAccordion}
            >
              <template if:true={displaySubLicense}>
                <lightning-icon
                  size="x-small"
                  icon-name="utility:switch"
                  class="slds-var-p-right_xx-small"
                ></lightning-icon>
              </template>
              <template if:false={displaySubLicense}>
                <lightning-icon
                  size="x-small"
                  icon-name="utility:chevronright"
                  class="slds-var-p-right_xx-small"
                ></lightning-icon>
              </template>
              <span class="slds-truncate">License</span>
            </button>
          </h3>
          <template if:true={displaySubLicense}>
            <div
              aria-hidden="false"
              class="slds-section__content slds-var-p-around_medium slds-card"
              id="licenseContent"
            >
              <template if:true={displaySpinner}>
                <lightning-spinner
                  alternative-text="Loading"
                  size="medium"
                  variant="brand"
                ></lightning-spinner>
              </template>
              <template if:true={license}>
                <div
                  class="slds-card_boundary slds-var-m-around_small card-style"
                >
                  <c-package-lma-timeline
                    license={license}
                    onrefresh={handleRefresh}
                  ></c-package-lma-timeline>
                </div>
              </template>
              <template if:true={displayEmptyLMA}>
                <div class="card-style slds-card_boundary slds-p-around_large">
                  <lightning-empty-state
                    title="Hmm..."
                    illustration-name="success:new"
                  >
                    <p slot="description">
                      Looks like we could not find the associated license for
                      this subscriber or the package is not connected to the
                      LMA...
                    </p>
                    <lightning-button
                      variant="brand"
                      label="Associate Package with LMA"
                      slot="cta"
                      onclick={navigateToHelpLma}
                    >
                    </lightning-button>
                  </lightning-empty-state>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>
      <template if:true={isPushUpgradeEnabled}>
        <template if:true={packageType}>
          <div class={upgradeAccordionClass}>
            <h3 class="slds-section__title">
              <button
                aria-controls="upgradeContent"
                aria-expanded="true"
                class="slds-button slds-section__title-action"
                onclick={togglePushUpgradeAccordion}
              >
                <template if:true={displayPushUpgradeList}>
                  <lightning-icon
                    size="x-small"
                    icon-name="utility:switch"
                    class="slds-var-p-right_xx-small"
                  ></lightning-icon>
                </template>
                <template if:false={displayPushUpgradeList}>
                  <lightning-icon
                    size="x-small"
                    icon-name="utility:chevronright"
                    class="slds-var-p-right_xx-small"
                  ></lightning-icon>
                </template>
                <span class="slds-truncate">Push Upgrade</span>
              </button>
            </h3>
            <template if:true={displayPushUpgradeList}>
              <div
                aria-hidden="false"
                class="slds-section__content slds-var-p-around_medium slds-card"
                id="upgradeContent"
              >
                <template if:true={displayUpgradeSpinner}>
                  <lightning-spinner
                    alternative-text="Loading"
                    size="medium"
                    variant="brand"
                  ></lightning-spinner>
                </template>
                <template if:true={instance}>
                  <template if:true={displayInstance}>
                    <div
                      class="slds-var-m-around_small slds-var-p-bottom_small"
                    >
                      <c-trust-instance-detail
                        instance-key={instance.key}
                        location={instance.location}
                        maintenance-window={instance.maintenanceWindow}
                        release-number={instance.releaseNumber}
                        release-version={instance.releaseVersion}
                        status={instance.status}
                      ></c-trust-instance-detail>
                    </div>
                  </template>
                </template>
                <template if:true={displayPushUpgradeSection}>
                  <div
                    class="slds-var-m-around_small slds-var-p-bottom_small slds-card_boundary card-style"
                  >
                    <div class="slds-grid slds-var-p-around_small">
                      <lightning-breadcrumbs class="" style="font-weight: 700">
                        <lightning-breadcrumb
                          label={pushUpgradeBreadCrumbLabel}
                        >
                        </lightning-breadcrumb>
                      </lightning-breadcrumbs>
                    </div>
                    <div>
                      <c-package-push-upgrades-version-modal
                        package-version-number={packageVersionNumber}
                        subscriber-package-id={metadataPackageId}
                        org-key={orgKey}
                      ></c-package-push-upgrades-version-modal>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
      </template>
      <template if:true={isActiveProductionOrg}>
        <div class={sandboxAccordionClass}>
          <h3 class="slds-section__title">
            <button
              aria-controls="sandboxContent"
              aria-expanded="true"
              class="slds-button slds-section__title-action"
              onclick={toggleSandboxAccordion}
            >
              <template if:true={displaySandboxes}>
                <lightning-icon
                  size="x-small"
                  icon-name="utility:switch"
                  class="slds-var-p-right_xx-small"
                ></lightning-icon>
              </template>
              <template if:false={displaySandboxes}>
                <lightning-icon
                  size="x-small"
                  icon-name="utility:chevronright"
                  class="slds-var-p-right_xx-small"
                ></lightning-icon>
              </template>
              <span class="slds-truncate">Sandboxes</span>
            </button>
          </h3>
          <template if:true={displaySandboxes}>
            <div
              aria-hidden="false"
              class="slds-section__content slds-var-p-around_medium slds-card"
              id="sandboxContent"
            >
              <c-package-subscriber-sandboxes-view org-key={orgKey}>
              </c-package-subscriber-sandboxes-view>
            </div>
          </template>
        </div>
      </template>
    </template>
    <template if:false={orgKey}>
      <div
        class="slds-notify slds-notify_alert slds-alert_warning"
        role="alert"
      >
        <span class="slds-assistive-text">warning</span>
        <span
          class="slds-icon_container slds-icon-utility-warning slds-var-m-right_x-small"
        >
          <lightning-icon
            size="small"
            icon-name="utility:warning"
            alternative-text="warning"
            title="warning"
          ></lightning-icon>
        </span>
        <h2>
          Oh no! It looks like the org does not exist or the subscriber has
          uninstalled your package!
        </h2>
      </div>
    </template>
  </div>
  <template if:true={displayAppAnalyticsModal}>
    <c-app-analytics-flow-modal
      header="Request AppAnalytics"
      subscriber-package-id={metadataPackageId}
      subscribers={subscribers}
      oncancel={handleAppAnalyticsCloseModal}
    ></c-app-analytics-flow-modal>
  </template>
</template>
